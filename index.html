<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Story Engine</title>

<style>

body {
  margin:0;
  font-family: system-ui, -apple-system, sans-serif;
  background:#111;
  color:white;
}

#scene {
  position:relative;
  height:100vh;
  width:100vw;
  overflow:hidden;
}

#scene img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  transition:opacity .6s ease;
}

#story-card {
  position:absolute;
  bottom:0;
  width:100%;
  padding:40px;
  background:linear-gradient(
    transparent,
    rgba(0,0,0,.8)
  );
}

#story-text {
  font-size:22px;
  max-width:800px;
}

#choices {
  margin-top:20px;
}

button {
  display:block;
  margin:10px 0;
  padding:14px 20px;
  font-size:16px;
  background:#ffffff;
  color:black;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:transform .15s ease;
}

button:hover {
  transform:scale(1.03);
}

</style>
</head>

<body>

<div id="scene">

<img id="story-media">

<div id="story-card">

<div id="story-text"></div>

<div id="choices"></div>

</div>

</div>

<script src="engine.js"></script>

</body>
</html>
